name: Build and blue-green deploy

on:
  push:
    branches: [main]

concurrency:
  group: production-deploy
  cancel-in-progress: false

permissions:
  contents: read

env:
  IMAGE_NAME: ${{ secrets.DOCKERHUB_USERNAME }}/zero-downtime-deployment
  DEPLOY_DIR: /home/um/zero-downtime
  NGINX_CONTAINER: nginx

jobs:
  build-and-deploy:
    runs-on: [self-hosted, Linux, X64]
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Java 18
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '18'
          cache: maven

      - name: Test and package
        run: |
          chmod +x mvnw
          ./mvnw --batch-mode --errors clean package

      - name: Print test failure reports
        if: failure()
        run: |
          echo '===== Surefire test reports ====='
          find target/surefire-reports -maxdepth 1 -type f \
            \( -name '*.txt' -o -name '*.dumpstream' \) \
            -print -exec sed -n '1,240p' {} \; 2>/dev/null || true

      - name: Log in to Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push image
        env:
          IMAGE_TAG: ${{ github.sha }}
        run: |
          docker build -t "${IMAGE_NAME}:${IMAGE_TAG}" .
          docker push "${IMAGE_NAME}:${IMAGE_TAG}"

      - name: Deploy without downtime
        env:
          IMAGE_TAG: ${{ github.sha }}
        run: |
          set -Eeuo pipefail

          cd "$DEPLOY_DIR"
          test -f docker-compose-blue.yml
          test -f docker-compose-green.yml
          test -f nginx/default.conf
          docker network inspect zzd-network >/dev/null 2>&1 || \
            docker network create zzd-network
          docker inspect "$NGINX_CONTAINER" >/dev/null
          if ! docker inspect \
            --format '{{json .NetworkSettings.Networks}}' "$NGINX_CONTAINER" \
            | grep -q '"zzd-network"'; then
            docker network connect zzd-network "$NGINX_CONTAINER"
          fi

          if docker ps --format '{{.Names}}' | grep -qx 'zzd-blue'; then
            CURRENT=blue
            TARGET=green
            TARGET_PORT=9091
            TARGET_APP_PORT=8081
          elif docker ps --format '{{.Names}}' | grep -qx 'zzd-green'; then
            CURRENT=green
            TARGET=blue
            TARGET_PORT=9090
            TARGET_APP_PORT=8080
          else
            CURRENT=none
            TARGET=blue
            TARGET_PORT=9090
            TARGET_APP_PORT=8080
          fi

          export IMAGE_NAME IMAGE_TAG
          docker compose -f "docker-compose-${TARGET}.yml" pull
          docker compose -f "docker-compose-${TARGET}.yml" up -d --force-recreate

          TARGET_HOST_PORT=$(docker port "zzd-${TARGET}" \
            "${TARGET_APP_PORT}/tcp" | head -n 1 | awk -F: '{print $NF}')

          if [ -z "$TARGET_HOST_PORT" ]; then
            echo "Could not find the published port for ${TARGET_APP_PORT}/tcp."
            docker compose -f "docker-compose-${TARGET}.yml" down
            exit 1
          fi

          echo "Health check URL: http://127.0.0.1:${TARGET_HOST_PORT}/hc"

          READY=false
          for attempt in $(seq 1 30); do
            echo "Health check attempt: ${attempt}/30"
            if curl --fail --silent --show-error --output /dev/null \
              --connect-timeout 2 \
              "http://127.0.0.1:${TARGET_HOST_PORT}/hc"; then
              READY=true
              break
            fi
            sleep 2
          done

          if [ "$READY" != true ]; then
            docker logs "zzd-${TARGET}" || true
            docker compose -f "docker-compose-${TARGET}.yml" down
            echo "New ${TARGET} server did not become ready. Keeping ${CURRENT} server."
            exit 1
          fi

          cp nginx/default.conf nginx/default.conf.backup
          sed \
            "s#http://zzd-\(blue\|green\):808[01]#http://zzd-${TARGET}:${TARGET_APP_PORT}#" \
            nginx/default.conf > nginx/default.conf.next
          cat nginx/default.conf.next > nginx/default.conf
          rm -f nginx/default.conf.next

          if ! docker exec "$NGINX_CONTAINER" nginx -t; then
            cat nginx/default.conf.backup > nginx/default.conf
            docker compose -f "docker-compose-${TARGET}.yml" down
            echo "Nginx configuration is invalid. Keeping ${CURRENT} server."
            exit 1
          fi
          docker exec "$NGINX_CONTAINER" nginx -s reload

          LOADED_NGINX_CONFIG=$(docker exec "$NGINX_CONTAINER" nginx -T 2>&1)
          if ! grep -Fq \
            "set \$backend http://zzd-${TARGET}:${TARGET_APP_PORT};" \
            <<< "$LOADED_NGINX_CONFIG"; then
            cat nginx/default.conf.backup > nginx/default.conf
            docker exec "$NGINX_CONTAINER" nginx -t
            docker exec "$NGINX_CONTAINER" nginx -s reload
            docker compose -f "docker-compose-${TARGET}.yml" down
            echo "Nginx did not load the ${TARGET} upstream. Keeping ${CURRENT} server."
            exit 1
          fi

          if ! docker exec "$NGINX_CONTAINER" \
            wget -q -O /dev/null http://127.0.0.1/hc; then
            cat nginx/default.conf.backup > nginx/default.conf
            docker exec "$NGINX_CONTAINER" nginx -t
            docker exec "$NGINX_CONTAINER" nginx -s reload
            docker compose -f "docker-compose-${TARGET}.yml" down
            echo "Nginx proxy health check failed. Keeping ${CURRENT} server."
            exit 1
          fi

          rm -f nginx/default.conf.backup

          if [ "$CURRENT" != none ]; then
            sleep 10
            docker compose -f "docker-compose-${CURRENT}.yml" down
          fi

          docker image prune -f
          echo "Deployment complete: ${CURRENT} -> ${TARGET}"
