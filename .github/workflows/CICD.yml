name: Build and blue-green deploy

on:
  push:
    branches: [main]

concurrency:
  group: production-deploy
  cancel-in-progress: false

permissions:
  contents: read

env:
  IMAGE_NAME: ${{ secrets.DOCKERHUB_USERNAME }}/zero-downtime-deployment
  DEPLOY_DIR: /home/um/zero-downtime
  NGINX_CONTAINER: nginx

jobs:
  build-and-deploy:
    runs-on: [self-hosted, Linux, X64]
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Java 18
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '18'
          cache: maven

      - name: Test and package
        run: ./mvnw --batch-mode clean package

      - name: Log in to Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push image
        env:
          IMAGE_TAG: ${{ github.sha }}
        run: |
          docker build -t "${IMAGE_NAME}:${IMAGE_TAG}" .
          docker push "${IMAGE_NAME}:${IMAGE_TAG}"

      - name: Deploy without downtime
        env:
          IMAGE_TAG: ${{ github.sha }}
        run: |
          set -Eeuo pipefail

          cd "$DEPLOY_DIR"
          docker network inspect zzd-network >/dev/null 2>&1 || \
            docker network create zzd-network

          if docker ps --format '{{.Names}}' | grep -qx 'zzd-blue'; then
            CURRENT=blue
            TARGET=green
            TARGET_PORT=9091
          elif docker ps --format '{{.Names}}' | grep -qx 'zzd-green'; then
            CURRENT=green
            TARGET=blue
            TARGET_PORT=9090
          else
            CURRENT=none
            TARGET=blue
            TARGET_PORT=9090
          fi

          export IMAGE_NAME IMAGE_TAG
          docker compose -f "docker-compose-${TARGET}.yml" pull
          docker compose -f "docker-compose-${TARGET}.yml" up -d --force-recreate

          READY=false
          for attempt in $(seq 1 30); do
            if curl --silent --output /dev/null --connect-timeout 2 \
              "http://127.0.0.1:${TARGET_PORT}/"; then
              READY=true
              break
            fi
            sleep 2
          done

          if [ "$READY" != true ]; then
            docker logs "zzd-${TARGET}" || true
            docker compose -f "docker-compose-${TARGET}.yml" down
            echo "New ${TARGET} server did not become ready. Keeping ${CURRENT} server."
            exit 1
          fi

          cp nginx/default.conf nginx/default.conf.backup
          sed -i \
            "s#http://zzd-\(blue\|green\):8080#http://zzd-${TARGET}:8080#" \
            nginx/default.conf

          if ! docker exec "$NGINX_CONTAINER" nginx -t; then
            cp nginx/default.conf.backup nginx/default.conf
            docker compose -f "docker-compose-${TARGET}.yml" down
            echo "Nginx configuration is invalid. Keeping ${CURRENT} server."
            exit 1
          fi
          docker exec "$NGINX_CONTAINER" nginx -s reload
          rm -f nginx/default.conf.backup

          if [ "$CURRENT" != none ]; then
            docker compose -f "docker-compose-${CURRENT}.yml" down
          fi

          docker image prune -f
          echo "Deployment complete: ${CURRENT} -> ${TARGET}"
